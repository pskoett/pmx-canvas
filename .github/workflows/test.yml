name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      # dist/types is committed and tsc output is deterministic, so a byte
      # check is reliable. The dist/canvas and dist/json-render bundles are
      # deliberately NOT checked: bundler output varies across bun versions,
      # so a byte-diff gate on them would flake (plan-009 M1 tracks bundles).
      - name: dist/types staleness check
        run: |
          bun run build:types
          if [ -n "$(git status --porcelain dist/types)" ]; then
            git status --porcelain dist/types
            echo "::error::dist/types is stale — run 'bun run build:types' and commit the result."
            exit 1
          fi

      - name: Validate agent skill mirrors
        run: bun run validate:agent-skills

      - name: Unit tests with coverage
        run: bun run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # Required cross-platform gate: the unit suite must pass on Windows and
  # macOS on every change (the 0.3.1 Windows report found the SPA had never
  # booted on Windows — a path-separator bug no ubuntu-only CI could catch).
  # Runs typecheck + the full unit suite; lint/coverage/mirror checks stay on
  # the ubuntu job (they are platform-independent). Bash-backed suites
  # (web-artifacts) self-skip on Windows via describe.skipIf(win32).
  test-cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

  # Required e2e gate. Kept separate from unit tests so unit feedback stays
  # fast; must NOT be allowed to soft-fail (no continue-on-error). Runs the
  # Playwright suite via scripts/run-playwright.sh (Node runner — see
  # ERR-20260508-001 for why `bun x playwright test` is broken).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve @playwright/test version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      # Cache the browser download keyed on the @playwright/test version so a
      # recurrence of the apt-mirror hang (LRN-20260603-001) only costs the
      # `--with-deps` apt portion, not the browser download too.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # Step-level timeout so a hang fails fast on this step instead of the
      # generic job timeout (LRN-20260603-001 suggested action #3).
      - name: Install Playwright browser
        timeout-minutes: 15
        run: npx playwright install --with-deps chromium

      - name: Web canvas e2e
        run: bun run test:web-canvas

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
